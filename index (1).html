<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Photography</title>
    <!-- Animate.css for smooth animations -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Black and Gold Theme Styling */
        :root {
            --bg-color: #0b0b0b;
            --card-bg: #161616;
            --gold: #d4af37;
            --gold-hover: #f3e5ab;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Header / Logo Section */
        header {
            text-align: center;
            padding: 40px 20px;
            border-bottom: 1px solid var(--gold);
            background: linear-gradient(180deg, #1f1f1f 0%, #0b0b0b 100%);
        }

        header h1 {
            font-size: 3rem;
            color: var(--gold);
            margin: 0;
            letter-spacing: 3px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        header p {
            font-style: italic;
            color: #aaa;
            margin-top: 10px;
        }

        /* Main Gallery Container */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Admin Upload Section */
        .admin-section {
            background-color: var(--card-bg);
            border: 1px dashed var(--gold);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 40px;
            text-align: center;
        }

        .admin-section h3 {
            color: var(--gold);
            margin-top: 0;
        }

        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .btn-upload {
            border: 2px solid var(--gold);
            color: var(--gold);
            background-color: transparent;
            padding: 10px 25px;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-upload:hover {
            background-color: var(--gold);
            color: var(--bg-color);
            box-shadow: 0 0 15px var(--gold);
        }

        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        /* Photo Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .gallery-item {
            background-color: var(--card-bg);
            border: 1px solid #222;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .gallery-item:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
            border-color: var(--gold);
        }

        .gallery-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }

        /* Floating WhatsApp Button */
        .whatsapp-float {
            position: fixed;
            width: 60px;
            height: 60px;
            bottom: 40px;
            right: 40px;
            background-color: #25d366;
            color: #FFF;
            border-radius: 50px;
            text-align: center;
            font-size: 30px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .whatsapp-float:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px #25d366;
            color: #fff;
        }

        footer {
            text-align: center;
            padding: 30px;
            color: #777;
            font-size: 14px;
            border-top: 1px solid #222;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <!-- Header Section -->
    <header class="animate__animated animate__fadeInDown">
        <h1>PIXEL PHOTOGRAPHY</h1>
        <p>Capturing Moments, Creating Memories</p>
    </header>

    <div class="container">
        
        <!-- Upload Section -->
        <div class="admin-section animate__animated animate__fadeIn animate__delay-1s">
            <h3><i class="fa-solid fa-camera"></i> Upload New Shoots (Admin Only)</h3>
            <p style="font-size: 13px; color: #888;">Note: This browser-based upload updates the screen instantly for preview.</p>
            <div class="upload-btn-wrapper">
                <button class="btn-upload"><i class="fa-solid fa-cloud-arrow-up"></i> Select Photos</button>
                <input type="file" id="imageLoader" name="imageLoader" accept="image/*" multiple />
            </div>
        </div>

        <!-- Photo Gallery Grid -->
        <div class="gallery-grid" id="gallery">
            <div class="gallery-item animate__animated animate__zoomIn">
                <img src="https://images.unsplash.com/photo-1516035069371-29a1b244cc32?auto=format&fit=crop&w=500&q=80" alt="Shoot 1">
            </div>
            <div class="gallery-item animate__animated animate__zoomIn">
                <img src="https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=500&q=80" alt="Shoot 2">
            </div>
            <div class="gallery-item animate__animated animate__zoomIn">
                <img src="https://images.unsplash.com/photo-1542038784456-1ea8e935640e?auto=format&fit=crop&w=500&q=80" alt="Shoot 3">
            </div>
        </div>

    </div>

    <!-- Floating WhatsApp Button -->
    <a href="https://wa.me/94726962988?text=Hi%20Pixel%20Photography,%20I%20would%20like%20to%20book%20a%20shoot!" class="whatsapp-float animate__animated animate__bounceInUp animate__delay-2s" target="_blank">
        <i class="fa-brands fa-whatsapp"></i>
    </a>

    <!-- Footer -->
    <footer>
        &copy; 2026 Pixel Photography. All Rights Reserved.
    </footer>

    <!-- JavaScript to Handle Photo Upload Live Preview -->
    <script>
        const imageLoader = document.getElementById('imageLoader');
        const gallery = document.getElementById('gallery');

        imageLoader.addEventListener('change', handleImage, false);

        function handleImage(e) {
            const files = e.target.files;
            
            for (let i = 0; i < files.length; i++) {
                const reader = new FileReader();
                
                reader.onload = function(event) {
                    const galleryItem = document.createElement('div');
                    galleryItem.classList.add('gallery-item', 'animate__animated', 'animate__zoomIn');
                    
                    const img = document.createElement('img');
                    img.src = event.target.result;
                    
                    galleryItem.appendChild(img);
                    gallery.insertBefore(galleryItem, gallery.firstChild);
                }
                
                reader.readAsDataURL(files[i]);
            }
        }
    </script>
</body>
</html>
